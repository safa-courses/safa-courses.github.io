<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course-Personal Course Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
        <h1>Personal Courses Organizer</h1>
    </header>
     <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="my-courses.html">My Courses</a></li>
            <li><a href="add-course.html">Add Course</a></li>
            <li><a href="contact-us.html">Contact Us</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Add New Course</h2>
            <form action="#" method="post">
                <label for="cuorse-name">Course Name:</label>
                <input type="text" id="cuorse-name" name="cuorse-name" required>

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required>

                <label for="Credit-hours">Credit-Hours:</label>
                <input type="number" id="Credit-hour" name="Credit-hours" min="1" max="6" required>

                <label for="notes">Notes:</label>
                <textarea name="notes" id="notes" rows="4" placeholder="Any additional notes...."></textarea>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Personal Courses Organizer. All right reserved</p>
    </footer>
</body>
</html>
